# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install poetry
      run: pipx install poetry==2.2.1
    - name: Install dependencies
      run: poetry sync
    - name: Lint pyproject.toml
      run: poetry check --strict
    - name: Lint with ruff
      run: poetry run ruff check --output-format github .
    - name: Type check with mypy
      run: poetry run mypy --strict .
    - name: Test with pytest
      run: poetry run pytest
    - name: Build package
      run: poetry build
    - name: Smoke test built wheel
      run: |
        python -m venv .venv-smoke
        .venv-smoke/bin/pip install dist/*.whl
        .venv-smoke/bin/python -c "from importlib.metadata import version; from ke2daira import __version__, ke2dairanize; assert __version__ == version('ke2daira'); assert ke2dairanize('松平 健') == 'ケツダイラ マン'"
